name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Test
        run: node --test test/*.test.js
      - name: Smoke-test the CLI
        run: |
          node bin/certior-guard.js check
          node bin/certior-guard.js test Read .env
          echo '{"tool_name":"Read","tool_input":{"file_path":".env"}}' | node bin/certior-guard.js hook
      - name: Smoke-test the self-contained plugin hook (no install)
        run: |
          node -e "['.claude-plugin/plugin.json','.claude-plugin/marketplace.json','hooks/hooks.json'].forEach(f=>JSON.parse(require('fs').readFileSync(f,'utf8')))"
          out=$(echo '{"tool_name":"Read","tool_input":{"file_path":".env"}}' | CLAUDE_PLUGIN_ROOT="$PWD" node hooks/run.js)
          echo "$out" | grep -q '"permissionDecision":"deny"'
